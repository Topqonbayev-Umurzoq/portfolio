<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Umurzoq Topqonbayev</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: #111;
            color: #fff;
            margin: 0;
            padding: 20px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .item {
            background: rgba(0, 191, 255, 0.1);
            padding: 15px;
            border-radius: 5px;
            border: 1px solid rgba(0, 191, 255, 0.3);
        }

        h1, h2 {
            color: #00bfff;
        }
    </style>
</head>
<body>
    <h1>Admin Panel</h1>

    <div class="panel">
        <h2>Projects</h2>
        <div class="grid">
            {% for project in projects %}
            <div class="item">
                <h3>{{ project.title }}</h3>
                <p>{{ project.description }}</p>
                <p>Tech: {{ project.technologies }}</p>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="panel">
        <h2>Skills</h2>
        <div class="grid">
            {% for skill in skills %}
            <div class="item">
                <h3>{{ skill.name }}</h3>
                <p>Category: {{ skill.category }}</p>
                <p>Proficiency: {{ skill.proficiency }}%</p>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
